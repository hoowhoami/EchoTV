name: echotv
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.7+8

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  video_player: ^2.10.1
  chewie: ^1.13.0
  cached_network_image: ^3.4.1
  flutter_blurhash: ^0.9.1
  flutter_riverpod: ^3.2.0
  flutter_hooks: ^0.21.3+1
  go_router: ^17.0.0
  lucide_icons: ^0.257.0
  google_fonts: ^6.3.2
  flutter_staggered_grid_view: ^0.7.0
  window_manager: ^0.5.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  wakelock_plus: ^1.4.0
  bs58: ^1.0.1
  tray_manager: ^0.5.2
  flutter_single_instance: ^1.5.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

  fonts:
    - family: MiSans
      fonts:
        - asset: fonts/MiSans-Normal.otf
          weight: 400
        - asset: fonts/MiSans-Medium.otf
          weight: 500
        - asset: fonts/MiSans-Semibold.otf
          weight: 600
        - asset: fonts/MiSans-Bold.otf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

  macos:
    generate: true
    image_path: "assets/icon/app_icon_macos.png"

  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"

  linux:
    generate: true
    image_path: "assets/icon/app_icon.png"

  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
